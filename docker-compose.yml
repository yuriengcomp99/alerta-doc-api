services:
  postgres:
    image: postgres:16-alpine
    container_name: alerta-doc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alerta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alerta_secret}
      POSTGRES_DB: ${POSTGRES_DB:-alerta_doc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alerta} -d ${POSTGRES_DB:-alerta_doc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: alerta-doc-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alerta-doc-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-alerta}:${POSTGRES_PASSWORD:-alerta_secret}@postgres:5432/${POSTGRES_DB:-alerta_doc}?schema=public
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  rabbitmq_data:
  uploads_data:
